services:
  - type: web
    name: finance-app-api
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: cd apps/api && npm run db:migrate && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false

  - type: web
    name: finance-app-web
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: cd apps/web && npx next start -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
